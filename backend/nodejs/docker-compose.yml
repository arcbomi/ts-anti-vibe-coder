version: "3.9"

services:
  # HTTP microservices and workers in the backend/nodejs workspace.
  api-gateway:
    image: node:22-alpine
    working_dir: /app
    command: ["./node_modules/.bin/tsx", "--env-file=.env", "services/api-gateway/src/server.ts"]
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "8080:8080"

  gitea-service:
    image: node:22-alpine
    working_dir: /app
    command: ["./node_modules/.bin/tsx", "--env-file=.env", "services/gitea-service/src/server.ts"]
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "8082:8082"

  exam-service:
