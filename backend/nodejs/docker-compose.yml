version: "3.9"

services:
  mongodb:
    image: mongo:7
    command: ["bash", "-lc", "exec mongod --quiet --bind_ip_all >/dev/null 2>&1"]
    env_file:
      - .env
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/27017'"]
      interval: 5s
      timeout: 5s
      retries: 20

  # HTTP microservices and workers in the backend/nodejs workspace.
  api-gateway:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-lc", "corepack enable && sh ./scripts/ensure-deps.sh services/api-gateway fastify @backend/microservice-sdk && pnpm dev:gateway"]
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "8080:8080"

  gitea-service:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-lc", "corepack enable && sh ./scripts/ensure-deps.sh services/gitea-service fastify pg @backend/microservice-sdk && pnpm dev:gitea"]
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "8082:8082"

  exam-service:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-lc", "corepack enable && sh ./scripts/ensure-deps.sh services/exam-service fastify @backend/microservice-sdk && pnpm dev:exam"]
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "3006:3006"

  tomorrow-service:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-lc", "corepack enable && sh ./scripts/ensure-deps.sh services/tomorrow-service fastify @backend/microservice-sdk && pnpm dev:tomorrow"]
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "3001:3001"

  auth-service:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-lc", "corepack enable && sh ./scripts/ensure-deps.sh services/auth-service fastify pg @backend/microservice-sdk && pnpm dev:auth"]
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "3005:3005"

  user-service:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-lc", "corepack enable && sh ./scripts/ensure-deps.sh services/user-service fastify mongodb @backend/microservice-sdk && pnpm dev:user"]
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "3002:3002"

  notification-service:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-lc", "corepack enable && sh ./scripts/ensure-deps.sh services/notification-service fastify @backend/microservice-sdk && pnpm dev:notification"]
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "3003:3003"

  relationship-service:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-lc", "corepack enable && sh ./scripts/ensure-deps.sh services/relationship-service fastify @backend/microservice-sdk && pnpm dev:relationship"]
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "3004:3004"

  worker-service:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-lc", "corepack enable && sh ./scripts/ensure-deps.sh services/worker-service fastify pg redis @backend/microservice-sdk && pnpm dev:worker"]
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "3007:3007"

volumes:
  mongodb_data:
