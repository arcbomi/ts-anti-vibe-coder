services:
  mongodb:
    image: mongo:7
    command: ["bash", "-lc", "exec mongod --quiet --bind_ip_all >/dev/null 2>&1"]
    env_file:
      - .env
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/27017'"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.9
    env_file:
      - .env
    command:
      [
        "redpanda",
        "start",
        "--overprovisioned",
        "--smp",
        "1",
        "--memory",
        "1G",
        "--reserve-memory",
        "0M",
        "--node-id",
        "0",
        "--check=false",
        "--kafka-addr",
        "0.0.0.0:9092",
        "--advertise-kafka-addr",
        "redpanda:9092"
      ]
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  mongodb_data:
  redis_data:
  redpanda_data:
