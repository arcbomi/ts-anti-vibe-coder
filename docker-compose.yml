name: ts-anti-vibe-coder

x-node-service: &node-service
  image: node:22-alpine
  working_dir: /app/backend/nodejs
  env_file:
    - .env
  volumes:
    - ./:/app
    - backend_node_modules:/app/backend/nodejs/node_modules
  depends_on:
    mongodb:
      condition: service_healthy
    redis:
      condition: service_healthy
    redpanda:
      condition: service_healthy
    nodejs-deps:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  mongodb:
    image: mongo:7
    command: ["bash", "-lc", "exec mongod --quiet --bind_ip_all >/dev/null 2>&1"]
    env_file:
      - .env
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/27017'"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.9
    env_file:
      - .env
    command:
      [
        "redpanda",
        "start",
        "--overprovisioned",
        "--smp",
        "1",
        "--memory",
        "1G",
        "--reserve-memory",
        "0M",
        "--node-id",
        "0",
        "--check=false",
        "--kafka-addr",
        "0.0.0.0:9092",
        "--advertise-kafka-addr",
        "redpanda:9092"
      ]
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  nodejs-deps:
    image: node:22-alpine
    working_dir: /app/backend/nodejs
    env_file:
      - .env
    command:
      [
        "sh",
        "-lc",
        "corepack enable && sh ./scripts/ensure-deps.sh services/user-service fastify mongodb redis @fastify/swagger @fastify/swagger-ui @backend/microservice-sdk"
      ]
    volumes:
      - ./:/app
      - backend_node_modules:/app/backend/nodejs/node_modules

  api-gateway:
    <<: *node-service
    command:
      [
        "sh",
        "-lc",
        "corepack enable && sh ./scripts/ensure-deps.sh services/api-gateway fastify @backend/microservice-sdk && pnpm dev:gateway"
      ]
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"

  auth-service:
    <<: *node-service
    command:
      [
        "sh",
        "-lc",
        "corepack enable && sh ./scripts/ensure-deps.sh services/auth-service fastify redis @fastify/swagger @fastify/swagger-ui @backend/microservice-sdk && pnpm dev:auth"
      ]
    ports:
      - "${AUTH_SERVICE_PORT:-3005}:3005"

  tomorrow-service:
    <<: *node-service
    command:
      [
        "sh",
        "-lc",
        "corepack enable && sh ./scripts/ensure-deps.sh services/tomorrow-service fastify @fastify/swagger @fastify/swagger-ui @backend/microservice-sdk && pnpm dev:tomorrow"
      ]
    ports:
      - "${TOMORROW_SERVICE_PORT:-3001}:3001"

  user-service:
    <<: *node-service
    command:
      [
        "sh",
        "-lc",
        "corepack enable && sh ./scripts/ensure-deps.sh services/user-service fastify mongodb @fastify/swagger @fastify/swagger-ui @backend/microservice-sdk && pnpm dev:user"
      ]
    ports:
      - "${USER_SERVICE_PORT:-3002}:3002"

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file:
      - .env
    command: ["sh", "./scripts/start-dev.sh"]
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api-gateway

  gitea-service:
    <<: *node-service
    profiles: ["optional"]
    command:
      [
        "sh",
        "-lc",
        "corepack enable && sh ./scripts/ensure-deps.sh services/gitea-service fastify pg @backend/microservice-sdk && pnpm dev:gitea"
      ]
    ports:
      - "${GITEA_READER_SERVICE_HTTP_PORT:-8082}:8082"

  exam-service:
    <<: *node-service
    profiles: ["optional"]
    command:
      [
        "sh",
        "-lc",
        "corepack enable && sh ./scripts/ensure-deps.sh services/exam-service fastify @backend/microservice-sdk && pnpm dev:exam"
      ]
    ports:
      - "${EXAM_SERVICE_PORT:-3006}:3006"

  worker-service:
    <<: *node-service
    profiles: ["optional"]
    command:
      [
        "sh",
        "-lc",
        "corepack enable && sh ./scripts/ensure-deps.sh services/worker-service fastify pg redis @backend/microservice-sdk && pnpm dev:worker"
      ]
    ports:
      - "${WORKER_SERVICE_PORT:-3007}:3007"

volumes:
  backend_node_modules:
  frontend_node_modules:
  mongodb_data:
  redis_data:
  redpanda_data:
