x-backend-env: &backend-env
  APP_ENV: development
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/anti_vibe?sslmode=disable
  POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/anti_vibe?sslmode=disable
  QUEUE_URL: redis://redis:6379
  REDIS_ADDR: redis:6379
  QUEUE_NAMESPACE: ${QUEUE_NAMESPACE:-anti_vibe}
  ANALYSIS_QUEUE_NAME: ${ANALYSIS_QUEUE_NAME:-analysis_jobs}
  ANALYSIS_DEAD_LETTER_QUEUE_NAME: ${ANALYSIS_DEAD_LETTER_QUEUE_NAME:-analysis_jobs_dead}
  REPO_DOWNLOAD_QUEUE_NAME: ${REPO_DOWNLOAD_QUEUE_NAME:-repo_download_jobs}
  REPO_DOWNLOAD_DEAD_LETTER_QUEUE_NAME: ${REPO_DOWNLOAD_DEAD_LETTER_QUEUE_NAME:-repo_download_jobs_dead}
  GITEA_BASE_URL: ${GITEA_BASE_URL:-https://gitea.com}
  GITEA_BOT_TOKEN: ${GITEA_BOT_TOKEN:-replace_me}
  GITEA_BOT_USERNAME: ${GITEA_BOT_USERNAME:-gitea-server-userbot}
  TOMORROW_BASE_URL: ${TOMORROW_BASE_URL:-https://01.tomorrow-school.ai}
  AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com}
  AI_API_KEY: ${AI_API_KEY:-replace_me}
  AI_MODEL: ${AI_MODEL:-gpt-4.1-mini}
  AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-60}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-internal-token}
  AUTH_JWT_HS256_SECRET: ${AUTH_JWT_HS256_SECRET:-local-dev-jwt-secret-change-me}
  JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me}
  JWT_ACCESS_TOKEN_TTL_MINUTES: ${JWT_ACCESS_TOKEN_TTL_MINUTES:-60}
  JWT_REFRESH_TOKEN_TTL_DAYS: ${JWT_REFRESH_TOKEN_TTL_DAYS:-30}
  AUTH_SERVICE_REPOSITORY: ${AUTH_SERVICE_REPOSITORY:-database}
  USER_SERVICE_REPOSITORY: ${USER_SERVICE_REPOSITORY:-database}
  EXAM_TIMEZONE: ${EXAM_TIMEZONE:-Asia/Shanghai}
  EXAM_OPEN_DOW: ${EXAM_OPEN_DOW:-Saturday}
  EXAM_PASS_PERCENT: ${EXAM_PASS_PERCENT:-70}
  EXAM_SERVICE_INTERNAL_TOKEN: ${EXAM_SERVICE_INTERNAL_TOKEN:-local-internal-token}
  REPO_STORAGE_ROOT: ${REPO_STORAGE_ROOT:-data/repos}
  REPO_CLONE_TIMEOUT_SECONDS: ${REPO_CLONE_TIMEOUT_SECONDS:-60}
  TOMORROW_SERVICE_URL: ${TOMORROW_SERVICE_URL:-http://tomorrow-service:3001}
  USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:3002}
  TOMORROW_USERNAME: ${TOMORROW_USERNAME:-dmukhat}
  TOMORROW_PASSWORD: ${TOMORROW_PASSWORD:-change-me}
  TOMORROW_AUTH_ENDPOINT: ${TOMORROW_AUTH_ENDPOINT:-}
  TOMORROW_REFERRER: ${TOMORROW_REFERRER:-}
  TOMORROW_X_JWT_TOKEN: ${TOMORROW_X_JWT_TOKEN:-undefined}
  TOMORROW_SESSION_ID: ${TOMORROW_SESSION_ID:-}
  TOMORROW_PROFILE_PATH: ${TOMORROW_PROFILE_PATH:-/intra/astanahub/profile?event=96}
  WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
  MAX_JOB_ATTEMPTS: ${MAX_JOB_ATTEMPTS:-3}
  RETRY_DELAY_SECONDS: ${RETRY_DELAY_SECONDS:-30}

x-backend-service: &backend-service
  build:
    context: ./backend
    target: dev
  volumes:
    - ./backend:/app/backend
    - go_mod_cache:/go/pkg/mod
    - go_build_cache:/root/.cache/go-build
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  restart: unless-stopped

x-node-service: &node-service
  image: node:22-alpine
  working_dir: /app/backend/nodejs
  environment:
    <<: *backend-env
  volumes:
    - ./:/app
    - backend_node_modules:/app/backend/nodejs/node_modules
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
    nodejs-deps:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  migrate:
    build:
      context: ./backend
      target: dev
    command: go run ./cmd/migrate up
    environment:
      <<: *backend-env
      SERVICE_NAME: migrate
    volumes:
      - ./backend:/app/backend
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy

  nodejs-deps:
    image: node:22-alpine
    working_dir: /app/backend/nodejs
    command: sh -lc "corepack enable && pnpm install"
    volumes:
      - ./:/app
      - backend_node_modules:/app/backend/nodejs/node_modules

  api-gateway:
    <<: *node-service
    command: sh -lc "corepack enable && pnpm dev:gateway"
    environment:
      <<: *backend-env
      API_GATEWAY_PORT: 8080
      AUTH_SERVICE_BASE_URL: http://auth-service:3005
      GITEA_READER_SERVICE_BASE_URL: http://gitea-service:8082
      QUESTION_SERVICE_BASE_URL: http://exam-service:3006/api/v1
      EXAM_SERVICE_BASE_URL: http://exam-service:3006/api/v1
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"

  auth-service:
    <<: *node-service
    command: sh -lc "corepack enable && pnpm dev:auth"
    environment:
      <<: *backend-env
      AUTH_SERVICE_PORT: 3005
      AUTH_CREDENTIAL_SECRET: ${AUTH_CREDENTIAL_SECRET:-local-dev-jwt-secret-change-me}
      TOMORROW_SCHOOL_AUTH_ENDPOINT: ${TOMORROW_SCHOOL_AUTH_ENDPOINT:-https://01.tomorrow-school.ai/api/auth/signin}
      TOMORROW_SCHOOL_AUTH_TIMEOUT_SECONDS: ${TOMORROW_SCHOOL_AUTH_TIMEOUT_SECONDS:-10}
      TOMORROW_SCHOOL_AUTH_REFERRER: ${TOMORROW_SCHOOL_AUTH_REFERRER:-}
      TOMORROW_SCHOOL_AUTH_X_JWT_TOKEN: ${TOMORROW_SCHOOL_AUTH_X_JWT_TOKEN:-undefined}
      TOMORROW_SCHOOL_AUTH_SESSION_ID: ${TOMORROW_SCHOOL_AUTH_SESSION_ID:-}
      TOMORROW_SCHOOL_GRAPHQL_ENDPOINT: ${TOMORROW_SCHOOL_GRAPHQL_ENDPOINT:-}
      TOMORROW_SCHOOL_GRAPHQL_ROLE: ${TOMORROW_SCHOOL_GRAPHQL_ROLE:-user}
      DEV_SEED_USER_NAME: ${DEV_SEED_USER_NAME:-Student User}
      DEV_SEED_USER_EMAIL: ${DEV_SEED_USER_EMAIL:-student@example.com}
      DEV_SEED_USER_PASSWORD: ${DEV_SEED_USER_PASSWORD:-correct-password}
    ports:
      - "${AUTH_SERVICE_PORT:-3005}:3005"

  user-service:
    <<: *node-service
    command: sh -lc "corepack enable && pnpm dev:user"
    environment:
      <<: *backend-env
      USER_SERVICE_PORT: 3002
    ports:
      - "${USER_SERVICE_PORT:-3002}:3002"

  gitea-service:
    <<: *node-service
    command: sh -lc "corepack enable && pnpm dev:gitea"
    environment:
      <<: *backend-env
      GITEA_SERVICE_PORT: 8082
    ports:
      - "${GITEA_READER_SERVICE_HTTP_PORT:-8082}:8082"

  ai-analysis-service:
    <<: *backend-service
    command: go run ./cmd/ai-analysis-service
    environment:
      <<: *backend-env
      SERVICE_NAME: ai-analysis-service
      AI_ANALYSIS_SERVICE_HTTP_PORT: 8083
    ports:
      - "${AI_ANALYSIS_SERVICE_HTTP_PORT:-8083}:8083"

  exam-service:
    <<: *node-service
    command: sh -lc "corepack enable && pnpm dev:exam"
    environment:
      <<: *backend-env
      EXAM_SERVICE_PORT: 3006
    ports:
      - "${EXAM_SERVICE_PORT:-3006}:3006"

  scheduler-service:
    <<: *backend-service
    command: go run ./cmd/scheduler-service
    environment:
      <<: *backend-env
      SERVICE_NAME: scheduler-service
      SCHEDULER_SERVICE_HTTP_PORT: 8086
    ports:
      - "${SCHEDULER_SERVICE_HTTP_PORT:-8086}:8086"

  tomorrow-service:
    <<: *node-service
    command: sh -lc "corepack enable && pnpm dev:tomorrow"
    environment:
      <<: *backend-env
      TOMORROW_SERVICE_PORT: 3001
    ports:
      - "${TOMORROW_SERVICE_PORT:-3001}:3001"

  worker-service:
    <<: *node-service
    command: sh -lc "corepack enable && pnpm dev:worker"
    environment:
      <<: *backend-env
      WORKER_SERVICE_PORT: 3007
    ports:
      - "${WORKER_SERVICE_PORT:-3007}:3007"

  frontend:
    build:
      context: ./frontend
      target: dev
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_GITEA_BOT_USERNAME: ${GITEA_BOT_USERNAME:-gitea-server-userbot}
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  go_mod_cache:
  go_build_cache:
  backend_node_modules:
  frontend_node_modules:
